<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Luxe & Minimaliste</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">Boutique</div>
        <div class="cart-icon" onclick="toggleCart(true)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count">0</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Chargement...</h1>
            <p>Découvrez notre sélection exclusive d'articles premium conçus pour sublimer votre quotidien.</p>
        </section>

        <section class="controls">
            <div class="filters">
                <!-- Populated by JS -->
            </div>
            <div class="sorting">
                <select class="sort-select" onchange="setSort(this.value)">
                    <option value="default">Trier par</option>
                    <option value="price-asc">Prix croissant</option>
                    <option value="price-desc">Prix décroissant</option>
                    <option value="name-asc">Nom A-Z</option>
                </select>
            </div>
        </section>

        <div class="products-grid">
            <!-- Populated by JS -->
        </div>

        <div class="load-more-container">
            <button class="btn-primary" onclick="loadMore()">Voir plus</button>
        </div>
    </main>

    <div class="cart-drawer">
        <div class="cart-header">
            <h2>Votre Panier</h2>
            <div class="close-cart" onclick="toggleCart(false)">✕</div>
        </div>
        <div class="cart-items">
            <!-- Populated by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span class="total-value">0 €</span>
            </div>
            <button class="btn-primary checkout-btn" style="width: 100%;" onclick="showCheckout()">Passer la commande</button>
            
            <!-- Using Formspree for Static Email Sending -->
            <form id="checkout-form" class="checkout-form" action="https://formspree.io/f/vorniere.antoine@gmail.com" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Nom complet" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Votre Email" required>
                </div>
                <div class="form-group">
                    <input type="text" name="address" placeholder="Adresse de livraison" required>
                </div>
                
                <!-- Hidden inputs for order details -->
                <input type="hidden" name="_subject" value="Nouvelle Commande Boutique Luxe">
                <input type="hidden" name="order_details" id="order-details-input">
                <input type="hidden" name="total_price" id="total-price-input">
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Confirmer & Recevoir la facture</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" onclick="closeProductModal(event)">
        <div class="product-modal" onclick="event.stopPropagation()">
            <div class="close-modal" onclick="closeProductModal(event)">✕</div>
            <div class="modal-left">
                <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-right">
                <div class="modal-category" id="modal-cat"></div>
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-description" id="modal-desc"></p>
                <div class="modal-price" id="modal-price"></div>
                <button class="btn-primary" id="modal-add-btn">Ajouter au panier</button>
                <div class="modal-tags" id="modal-tags"></div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
