<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6;
            --sidebar: #2c3e50;
            --primary: #3498db;
            --text: #333;
            --accent: #d4af37;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: var(--sidebar); color: white; padding: 2rem; }
        .sidebar h2 { margin-bottom: 2rem; font-size: 1.2rem; opacity: 0.8; }
        .nav-item { padding: 1rem; cursor: pointer; border-radius: 8px; margin-bottom: 0.5rem; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); }
        .main-content { flex-grow: 1; padding: 3rem; overflow-y: auto; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h1 { margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #eee; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 1rem; }
        .btn-edit { background: #f1c40f; color: white; margin-right: 0.5rem; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-save { background: #2ecc71; color: white; width: 100%; padding: 1rem; font-size: 1rem; }
        
        form label { display: block; margin-bottom: 0.5rem; font-weight: 600; margin-top: 1rem; }
        form input, form textarea, form select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 500px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 id="admin-title">Admin Panel</h2>
        <div class="nav-item active" onclick="showTab('products')">Produits</div>
        <div class="nav-item" onclick="showTab('design')">Design & Boutique</div>
        <div class="nav-item" onclick="window.location.href='index.html'">Voir le site</div>
    </div>

    <div class="main-content">
        <div id="products-tab" class="tab-content">
            <h1>Gestion des Produits</h1>
            <button class="btn btn-add" onclick="openProductModal()">+ Ajouter un produit</button>
            <div class="card">
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Titre</th>
                            <th>Catégorie</th>
                            <th>Prix</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="design-tab" class="tab-content" style="display:none;">
            <h1>Paramètres de la Boutique</h1>
            <div class="card">
                <form id="settings-form" onsubmit="handleSettingsSubmit(event)">
                    <label>Nom de la boutique</label>
                    <input type="text" name="store_name" id="set-store-name" required>
                    
                    <label>Email de contact (pour les commandes)</label>
                    <input type="email" name="contact_email" id="set-email" required>
                    
                    <label>Couleur d'accentuation</label>
                    <input type="color" name="accent_color" id="set-accent-color" style="width: 100px;">

                    <label>Devise</label>
                    <input type="text" name="currency" id="set-currency" required>

                    <label>Logo URL</label>
                    <input type="text" name="logo_url" id="set-logo-url">
                    
                    <div style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-save">Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Ajouter un produit</h2>
            <form id="product-form" onsubmit="handleProductSubmit(event)">
                <input type="hidden" name="id" id="prod-id">
                <label>Titre</label>
                <input type="text" name="title" id="prod-title" required>
                <label>Description</label>
                <textarea name="description" id="prod-desc" rows="4" required></textarea>
                <label>Prix (€)</label>
                <input type="number" name="price" id="prod-price" step="0.01" required>
                <label>Catégorie</label>
                <input type="text" name="category" id="prod-cat" required>
                <label>Tags (séparés par des virgules)</label>
                <input type="text" name="tags" id="prod-tags">
                <label>Stock</label>
                <input type="number" name="stock" id="prod-stock" required>
                <label>Image URL</label>
                <input type="text" name="image" id="prod-image">
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="button" class="btn" onclick="closeModal()" style="background:#ddd; flex:1;">Annuler</button>
                    <button type="submit" class="btn btn-save" style="flex:2;">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/db.js"></script>
    <script>
        let products = [];
        let settings = {};

        function init() {
            products = db.getProducts();
            settings = db.getSettings();
            renderProductsTable();
            loadSettingsForm();
            db.applyTheme(settings);
            document.getElementById('admin-title').innerText = settings.store_name;
        }

        function renderProductsTable() {
            const tbody = document.querySelector('#products-table tbody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.src='https://placehold.co/400x400?text=?'"></td>
                    <td>${p.title}</td>
                    <td>${p.category}</td>
                    <td>${p.price} ${settings.currency}</td>
                    <td>${p.stock}</td>
                    <td>
                        <button class="btn btn-edit" onclick="editProduct(${p.id})">Éditer</button>
                        <button class="btn btn-delete" onclick="deleteProduct(${p.id})">Suppr.</button>
                    </td>
                </tr>
            `).join('');
        }

        function loadSettingsForm() {
            document.getElementById('set-store-name').value = settings.store_name;
            document.getElementById('set-email').value = settings.contact_email;
            document.getElementById('set-accent-color').value = settings.accent_color;
            document.getElementById('set-currency').value = settings.currency;
            document.getElementById('set-logo-url').value = settings.logo_url;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(tab + '-tab').style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function openProductModal(p = null) {
            const modal = document.getElementById('product-modal');
            const form = document.getElementById('product-form');
            modal.style.display = 'flex';
            if (p) {
                document.getElementById('modal-title').innerText = "Modifier le produit";
                document.getElementById('prod-id').value = p.id;
                document.getElementById('prod-title').value = p.title;
                document.getElementById('prod-desc').value = p.description;
                document.getElementById('prod-price').value = p.price;
                document.getElementById('prod-cat').value = p.category;
                document.getElementById('prod-tags').value = p.tags.join(', ');
                document.getElementById('prod-stock').value = p.stock;
                document.getElementById('prod-image').value = p.image;
            } else {
                document.getElementById('modal-title').innerText = "Ajouter un produit";
                form.reset();
                document.getElementById('prod-id').value = '';
            }
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            openProductModal(p);
        }

        function deleteProduct(id) {
            if (confirm('Supprimer ce produit ?')) {
                products = products.filter(p => p.id !== id);
                db.saveProducts(products);
                renderProductsTable();
            }
        }

        function handleProductSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const id = formData.get('id');
            const product = {
                id: id ? parseInt(id) : Date.now(),
                title: formData.get('title'),
                description: formData.get('description'),
                price: parseFloat(formData.get('price')),
                category: formData.get('category'),
                tags: formData.get('tags').split(',').map(t => t.trim()),
                stock: parseInt(formData.get('stock')),
                image: formData.get('image')
            };

            if (id) {
                const idx = products.findIndex(p => p.id === parseInt(id));
                products[idx] = product;
            } else {
                products.push(product);
            }

            db.saveProducts(products);
            renderProductsTable();
            closeModal();
        }

        function handleSettingsSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newSettings = {
                ...settings,
                store_name: formData.get('store_name'),
                contact_email: formData.get('contact_email'),
                accent_color: formData.get('accent_color'),
                currency: formData.get('currency'),
                logo_url: formData.get('logo_url')
            };
            db.saveSettings(newSettings);
            settings = newSettings;
            alert('Paramètres sauvegardés localement !');
            init();
        }

        init();
    </script>
</body>
</html>
